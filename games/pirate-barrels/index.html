<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏴‍☠️ Pirate Peekaboo 🏴‍☠️</title>
<style>
  :root { --cup-w: 150px; --cup-h: 190px; --lift: 140px; }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; overflow: hidden;
    font-family: "Comic Sans MS", "Chalkboard SE", "Trebuchet MS", sans-serif; user-select: none; }

  /* sky + sea */
  body {
    background: linear-gradient(180deg, #8fd3f0 0%, #6ec3e8 45%, #2f93c4 60%, #1f6fa3 100%);
    color: #fff; cursor: none;
  }

  /* drifting clouds + sun */
  .cloud { position: fixed; font-size: 46px; top: 8%; opacity: .9; z-index: 0;
    animation: drift 40s linear infinite; }
  .cloud.c2 { top: 18%; font-size: 34px; animation-duration: 55s; animation-delay: -20s; }
  .cloud.c3 { top: 5%; font-size: 38px; animation-duration: 48s; animation-delay: -35s; }
  @keyframes drift { from { left: -12%; } to { left: 110%; } }
  .sun { position: fixed; top: 5%; right: 7%; font-size: 64px; z-index: 0;
    filter: drop-shadow(0 0 16px #ffe680); animation: bob 5s ease-in-out infinite; }
  @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

  /* ---------- pirate hook cursor ---------- */
  #wand { position: fixed; z-index: 9999; font-size: 46px; pointer-events: none;
    transform: translate(-6px, -36px) rotate(8deg); transition: transform 0.08s ease-out;
    will-change: transform, left, top; filter: drop-shadow(0 3px 4px rgba(0,0,0,.5)); }
  #wand.zap { transform: translate(-6px, -36px) rotate(8deg) scale(1.4); }

  /* ---------- header ---------- */
  header { position: relative; z-index: 3; text-align: center; padding-top: 16px; }
  h1 { font-size: clamp(26px, 5vw, 46px); color: #fff5d6;
    text-shadow: 2px 2px 0 #7a3b12, 4px 4px 6px rgba(0,0,0,.4); margin-bottom: 6px; }
  #status { font-size: clamp(18px, 3vw, 26px); min-height: 34px; color: #fff;
    text-shadow: 1px 1px 0 #7a3b12, 0 2px 5px rgba(0,0,0,.5); }

  /* ---------- stage / ship ---------- */
  #stage { position: relative; z-index: 1; width: 100%; height: 60vh; margin-top: 6px; }

  /* mast + sail + flag behind the barrels */
  .mast { position: absolute; left: 50%; top: -2%; width: 16px; height: 78%;
    background: linear-gradient(90deg, #6b4423, #9a6a39, #6b4423);
    transform: translateX(-50%); border-radius: 6px; z-index: 0; }
  .sail { position: absolute; left: 50%; top: 6%; width: 230px; height: 150px;
    transform: translateX(-50%);
    background: linear-gradient(180deg, #fffaf0, #e9dcc2);
    border-radius: 14px / 40px;
    box-shadow: inset 0 -16px 26px rgba(0,0,0,.12), 0 8px 14px rgba(0,0,0,.2);
    z-index: 0; }
  .sail::after { content: "💀"; position: absolute; inset: 0; display: flex;
    align-items: center; justify-content: center; font-size: 70px; opacity: .8; }
  .flag { position: absolute; left: calc(50% + 8px); top: -4%; font-size: 40px; z-index: 0;
    transform-origin: left center; animation: wave 2s ease-in-out infinite; }
  @keyframes wave { 0%,100% { transform: rotate(-4deg); } 50% { transform: rotate(6deg); } }

  /* the wooden deck the barrels stand on */
  .deck { position: absolute; left: -2%; right: -2%; bottom: 0; height: 130px; z-index: 0;
    background:
      repeating-linear-gradient(90deg, #8a5a2c 0 60px, #7c4f26 60px 62px),
      linear-gradient(180deg, #a9763d, #6e451f);
    box-shadow: inset 0 8px 14px rgba(255,255,255,.18), 0 -3px 8px rgba(0,0,0,.3);
    border-top: 5px solid #5e3a18; }
  /* boat railing */
  .rail { position: absolute; left: 0; right: 0; bottom: 120px; height: 16px; z-index: 0;
    background: linear-gradient(180deg, #b5803f, #7c4f26); border-radius: 8px;
    box-shadow: 0 3px 6px rgba(0,0,0,.35); }
  .post { position: absolute; bottom: 120px; width: 16px; height: 40px; z-index: 0;
    background: linear-gradient(90deg, #7c4f26, #a9763d, #7c4f26); border-radius: 5px; }

  /* ---------- the silly pirate hiding under a barrel ---------- */
  .hider { position: absolute; bottom: 48px; width: var(--cup-w);
    display: flex; justify-content: center; z-index: 2;
    opacity: 0; transform: scale(0.5) translateY(20px);
    transition: opacity .3s ease, transform .35s cubic-bezier(.3,1.5,.5,1); pointer-events: none; }
  .hider.show { opacity: 1; transform: scale(1) translateY(0); }
  .hider::before { content: ""; position: absolute; left: 50%; top: 45%; width: 130px; height: 130px;
    transform: translate(-50%,-50%); z-index: -1;
    background: radial-gradient(circle, rgba(255,235,150,.5), transparent 70%);
    animation: pulse 1.6s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity:.5; } 50% { opacity:1; } }

  /* pile of gold coins + many-colored diamonds */
  .treasure-pile { position: relative; width: 170px; height: 115px;
    animation: piratebob 1.4s ease-in-out infinite; }
  @keyframes piratebob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
  .coin { position: absolute; line-height: 1; filter: drop-shadow(0 2px 2px rgba(0,0,0,.45));
    animation: coinBob 1.6s ease-in-out infinite; }
  @keyframes coinBob { 0%,100% { transform: translateY(0) rotate(0); } 50% { transform: translateY(-3px) rotate(4deg); } }
  .gem { position: absolute; clip-path: polygon(50% 0%, 100% 38%, 50% 100%, 0% 38%);
    box-shadow: 0 2px 4px rgba(0,0,0,.4); animation: gemTwinkle 1.8s ease-in-out infinite; }
  .gem::after { content: ""; position: absolute; top: 8%; left: 16%; width: 36%; height: 26%;
    background: rgba(255,255,255,.85); clip-path: inherit; }
  @keyframes gemTwinkle { 0%,100% { filter: brightness(1); } 50% { filter: brightness(1.45); } }

  /* ---------- the barrel ---------- */
  .cup { position: absolute; width: var(--cup-w); height: var(--cup-h); bottom: 40px; z-index: 5;
    transition: left 0.4s ease-in-out, transform 0.32s ease; }
  .cup.fast { transition: left 0.35s cubic-bezier(.45,0,.55,1), transform 0.32s ease; }
  .cup.lift { transform: translateY(calc(-1 * var(--lift))); }
  .cup.wiggle { animation: wiggle 0.45s ease; }
  @keyframes wiggle { 0%,100% { transform: rotate(0); } 25% { transform: rotate(-5deg); } 75% { transform: rotate(5deg); } }

  .cup-shadow { position: absolute; left: 8%; right: 8%; bottom: -8px; height: 22px;
    background: radial-gradient(ellipse, rgba(0,0,0,.5), transparent 70%); border-radius: 50%; z-index: -1;
    transition: opacity .3s ease; }
  .cup.lift .cup-shadow { opacity: .35; transform: scale(0.8); }

  .cup-body { position: absolute; inset: 0;
    border-radius: 40% 40% 38% 38% / 18% 18% 18% 18%;
    background:
      linear-gradient(90deg, rgba(0,0,0,.55) 0%, rgba(0,0,0,.05) 22%, rgba(255,255,255,.30) 44%,
        rgba(255,255,255,.05) 60%, rgba(0,0,0,.18) 78%, rgba(0,0,0,.55) 100%),
      repeating-linear-gradient(90deg, #6f421e 0 13px, #8a5a2b 13px 15px, #9a6533 15px 27px, #6f421e 27px 29px);
    background-blend-mode: soft-light, normal;
    box-shadow: 0 16px 20px -8px rgba(0,0,0,.55), inset 0 -20px 28px rgba(0,0,0,.4),
      inset 0 8px 14px rgba(255,255,255,.18); }
  /* barrel top lid */
  .cup-body::before { content: ""; position: absolute; top: -3px; left: 6%; right: 6%; height: 22px;
    border-radius: 50%; background: radial-gradient(ellipse, #b07d44, #6f421e);
    box-shadow: inset 0 3px 5px rgba(0,0,0,.4); }
  /* metal hoops */
  .hoop { position: absolute; left: -3px; right: -3px; height: 14px; z-index: 1;
    background: linear-gradient(180deg, #e2e2e2, #9a9a9a 45%, #555 100%); border-radius: 4px;
    box-shadow: inset 0 1px 2px rgba(255,255,255,.7), 0 2px 4px rgba(0,0,0,.45); }
  .hoop.top { top: 22%; } .hoop.bot { top: 70%; }
  .cup-mark { position: absolute; top: 40%; left: 0; right: 0; text-align: center; font-size: 40px;
    z-index: 1; filter: drop-shadow(0 2px 2px rgba(0,0,0,.5)); opacity: .85; }

  /* ---------- buttons ---------- */
  #controls { position: relative; z-index: 6; text-align: center; margin-top: 6px; }
  button { font-family: inherit; font-size: 24px; padding: 14px 34px; border: none; border-radius: 40px;
    background: linear-gradient(135deg, #c0262d, #7a1418); color: #fff; cursor: none;
    box-shadow: 0 6px 0 #5a0e12, 0 10px 16px rgba(0,0,0,0.35);
    transition: transform 0.1s ease, box-shadow 0.1s ease; text-shadow: 0 2px 3px rgba(0,0,0,0.4); }
  button:active { transform: translateY(5px); box-shadow: 0 1px 0 #5a0e12, 0 4px 8px rgba(0,0,0,0.35); }
  button:disabled { opacity: 0.45; }

  #levels { margin-bottom: 14px; }
  .lvl { font-size: 18px; padding: 8px 18px; margin: 0 5px;
    background: linear-gradient(135deg, #5a6a78, #3a4a58); box-shadow: 0 4px 0 #28323c, 0 6px 10px rgba(0,0,0,0.3); opacity: 0.7; }
  .lvl.active { opacity: 1; background: linear-gradient(135deg, #ffd34d, #ff8a3d);
    box-shadow: 0 4px 0 #c46a1f, 0 6px 12px rgba(0,0,0,0.35); transform: scale(1.08); }

  /* ---------- win popup ---------- */
  #fairy-layer { position: fixed; inset: 0; z-index: 8000; display: none;
    align-items: center; justify-content: center; flex-direction: column;
    background: rgba(10,30,50,0.5); backdrop-filter: blur(2px); }
  #fairy-layer.show { display: flex; }
  #bigPirate { transform: scale(2.4); animation: floaty 2s ease-in-out infinite; }
  @keyframes floaty { 0%,100% { transform: scale(2.4) translateY(0); } 50% { transform: scale(2.4) translateY(-10px); } }
  #fairy-msg { margin-top: 70px; font-size: clamp(30px, 6vw, 60px); color: #ffe24d;
    text-shadow: 2px 2px 0 #7a3b12, 0 4px 12px rgba(0,0,0,.4); animation: popIn 0.7s ease; text-align: center; }
  @keyframes popIn { 0% { transform: scale(0); } 70% { transform: scale(1.2); } 100% { transform: scale(1); } }

  .particle { position: fixed; z-index: 8500; pointer-events: none; font-size: 28px; animation: fall linear forwards; }
  @keyframes fall { 0% { transform: translateY(-20px) rotate(0); opacity: 1; } 100% { transform: translateY(100vh) rotate(540deg); opacity: 0.2; } }
</style>
</head>
<body>

<div class="sun">☀️</div>
<div class="cloud c1">☁️</div>
<div class="cloud c2">⛅</div>
<div class="cloud c3">☁️</div>

<header>
  <h1>🏴‍☠️ Pirate Peekaboo 🏴‍☠️</h1>
  <div id="status">Tap “Start” and watch closely, matey! 👀</div>
</header>

<div id="stage">
  <div class="mast"></div>
  <div class="sail"></div>
  <div class="flag">🏴‍☠️</div>
  <div class="rail"></div>
  <div class="deck"></div>
</div>

<div id="controls">
  <div id="levels">
    <button class="lvl active" data-level="easy">🐢 Easy</button>
    <button class="lvl" data-level="medium">🦀 Medium</button>
    <button class="lvl" data-level="hard">🦈 Hard</button>
  </div>
  <button id="startBtn">▶ Start</button>
</div>

<div id="wand">🪝</div>

<div id="fairy-layer">
  <div id="bigPirate"></div>
  <div id="fairy-msg">Arrr! Ye found the treasure! 💎🪙</div>
</div>

<script>
/* ============================================================
   Pirate Peekaboo — find the barrel the silly pirate hides under
   (same engine as Magic Treasure Cups, pirate reskin)
   ============================================================ */

const NUM_CUPS = 3;
const LEVELS = {
  easy:   { seconds: 6,  swapMs: 750, speedup: 0,  revealMs: 3000 },
  medium: { seconds: 9,  swapMs: 480, speedup: 4,  revealMs: 2400 },
  hard:   { seconds: 12, swapMs: 360, speedup: 7,  revealMs: 1900 },
};
let level = 'easy';

const stage = document.getElementById('stage');
const statusEl = document.getElementById('status');
const startBtn = document.getElementById('startBtn');
const wand = document.getElementById('wand');
const fairyLayer = document.getElementById('fairy-layer');

let cups = [];
let hideEl = null;       // the treasure pile, sits on the deck
let treasureSlot = 0;    // which slot the treasure is under
let canPick = false;
let busy = false;

/* a glittering pile of gold coins + many-colored diamonds, reused for
   the hider under the barrel and the big win popup */
const COINS = [
  {x:24,y:0,s:42}, {x:64,y:0,s:48}, {x:104,y:0,s:42},
  {x:46,y:24,s:38}, {x:86,y:26,s:38}, {x:120,y:4,s:34},
];
const GEMS = [
  {c:'#ff4d6d', x:16,  y:18, s:30, r:-16}, // ruby red
  {c:'#ff9a3d', x:50,  y:50, s:30, r:8},   // orange
  {c:'#ffe24d', x:128, y:30, s:28, r:-10}, // yellow
  {c:'#4dff7a', x:96,  y:54, s:32, r:14},  // emerald green
  {c:'#4dd2ff', x:70,  y:18, s:28, r:-6},  // sky blue
  {c:'#5d7dff', x:8,   y:2,  s:26, r:12},  // sapphire
  {c:'#b14dff', x:118, y:60, s:30, r:-18}, // amethyst purple
  {c:'#ff5dc8', x:38,  y:6,  s:26, r:20},  // pink
  {c:'#3dffd0', x:150, y:6,  s:24, r:-8},  // teal
];
function buildTreasureHTML() {
  let html = '';
  for (const o of COINS)
    html += `<span class="coin" style="left:${o.x}px;bottom:${o.y}px;font-size:${o.s}px">🪙</span>`;
  for (const o of GEMS)
    html += `<span class="gem" style="left:${o.x}px;bottom:${o.y}px;width:${o.s}px;height:${o.s}px;`
          + `transform:rotate(${o.r}deg);background:linear-gradient(150deg,#ffffff 0%, ${o.c} 48%, ${o.c} 100%)"></span>`;
  return `<div class="treasure-pile">${html}</div>`;
}
const TREASURE_HTML = buildTreasureHTML();
document.getElementById('bigPirate').innerHTML = TREASURE_HTML;

/* ---- hook follows the mouse ---- */
window.addEventListener('mousemove', (e) => { wand.style.left = e.clientX + 'px'; wand.style.top = e.clientY + 'px'; });
window.addEventListener('mousedown', () => wand.classList.add('zap'));
window.addEventListener('mouseup',   () => setTimeout(()=>wand.classList.remove('zap'), 120));

/* ---- layout ---- */
function slotPositions() {
  const w = stage.clientWidth, cupW = 150;
  const gap = Math.min(70, Math.max(20, (w - NUM_CUPS*cupW) / (NUM_CUPS+1)));
  const totalW = NUM_CUPS*cupW + (NUM_CUPS-1)*gap;
  const startX = (w - totalW) / 2;
  const pos = [];
  for (let i=0;i<NUM_CUPS;i++) pos.push(startX + i*(cupW+gap));
  return pos;
}

function buildScene() {
  cups.forEach(c => c.remove());
  if (hideEl) hideEl.remove();
  cups = [];

  hideEl = document.createElement('div');
  hideEl.className = 'hider';
  hideEl.innerHTML = TREASURE_HTML;
  stage.appendChild(hideEl);

  const pos = slotPositions();
  for (let i=0;i<NUM_CUPS;i++){
    const cup = document.createElement('div');
    cup.className = 'cup';
    cup.dataset.slot = i;
    cup.style.left = pos[i] + 'px';
    cup.innerHTML = `<div class="cup-body"></div><div class="hoop top"></div><div class="hoop bot"></div><div class="cup-mark">⚓</div><div class="cup-shadow"></div>`;
    cup.addEventListener('click', () => onPick(cup));
    stage.appendChild(cup);
    cups.push(cup);
  }
}

function cupAtSlot(slot){ return cups.find(c => +c.dataset.slot === slot); }
function placeCupsToSlots() { const pos = slotPositions(); cups.forEach(c => { c.style.left = pos[+c.dataset.slot] + 'px'; }); }
window.addEventListener('resize', placeCupsToSlots);

function liftCup(slot, lift) { const cup = cupAtSlot(slot); if (cup) cup.classList.toggle('lift', lift); }
function showHiderAt(slot) { const pos = slotPositions(); hideEl.style.left = pos[slot] + 'px'; hideEl.classList.add('show'); }
function hideHider() { hideEl.classList.remove('show'); }
function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }

async function swap(a, b) {
  const cupA = cupAtSlot(a), cupB = cupAtSlot(b);
  cupA.classList.add('fast'); cupB.classList.add('fast');
  cupA.dataset.slot = b; cupB.dataset.slot = a;
  placeCupsToSlots();
  if (treasureSlot === a) treasureSlot = b; else if (treasureSlot === b) treasureSlot = a;
}

async function startGame() {
  if (busy) return;
  busy = true; canPick = false;
  startBtn.disabled = true;
  fairyLayer.classList.remove('show');

  buildScene(); placeCupsToSlots(); hideHider();
  treasureSlot = Math.floor(Math.random()*NUM_CUPS);
  const cfg = LEVELS[level];

  statusEl.textContent = 'The treasure hides here! Remember the barrel… 💎🪙';
  await sleep(350);
  liftCup(treasureSlot, true); showHiderAt(treasureSlot);
  await sleep(cfg.revealMs);
  liftCup(treasureSlot, false); await sleep(380); hideHider(); await sleep(300);

  statusEl.textContent = 'Rollin’ the barrels! Follow the sneaky one… 🌊';
  const endTime = Date.now() + cfg.seconds*1000;
  let swapDuration = cfg.swapMs;
  while (Date.now() < endTime) {
    let a = Math.floor(Math.random()*NUM_CUPS), b = Math.floor(Math.random()*NUM_CUPS);
    while (b === a) b = Math.floor(Math.random()*NUM_CUPS);
    await swap(a, b);
    const remaining = endTime - Date.now();
    statusEl.textContent = 'Rollin’… ' + Math.max(0, Math.ceil(remaining/1000)) + 's 🌊';
    await sleep(swapDuration);
    if (swapDuration > 260) swapDuration -= cfg.speedup;
  }

  statusEl.textContent = 'Now! Hook the barrel the treasure hides under! 🪝';
  canPick = true; busy = false;
  cups.forEach(c => c.classList.add('wiggle'));
  setTimeout(()=>cups.forEach(c => c.classList.remove('wiggle')), 460);
}

async function onPick(cup) {
  if (!canPick) return;
  canPick = false;
  const pickedSlot = +cup.dataset.slot;
  const win = (pickedSlot === treasureSlot);

  liftCup(pickedSlot, true);
  if (win) {
    showHiderAt(pickedSlot);
    await sleep(600);
    statusEl.textContent = 'Yo-ho! Ye found the treasure! 💎🪙';
    celebrate();
  } else {
    await sleep(500);
    liftCup(treasureSlot, true); showHiderAt(treasureSlot);
    statusEl.textContent = 'Arrr, so close! The loot was there. Try again! 🏴‍☠️';
  }
  startBtn.disabled = false;
  startBtn.textContent = '▶ Play Again';
}

function celebrate() {
  fairyLayer.classList.add('show');
  confetti();
  try {
    const u = new SpeechSynthesisUtterance('Arr! Ye found the treasure, matey!');
    u.rate = 0.9; u.pitch = 0.6;
    speechSynthesis.cancel(); speechSynthesis.speak(u);
  } catch(e){}
  const dismiss = () => { fairyLayer.classList.remove('show'); fairyLayer.removeEventListener('click', dismiss); };
  fairyLayer.addEventListener('click', dismiss);
}

function confetti() {
  const glyphs = ['🏴‍☠️','🦜','💰','🪙','⚓','💀','⭐','🍻','🗺️'];
  for (let i=0;i<80;i++){
    const p = document.createElement('div');
    p.className = 'particle';
    p.textContent = glyphs[Math.floor(Math.random()*glyphs.length)];
    p.style.left = Math.random()*100 + 'vw';
    p.style.top = '-30px';
    p.style.animationDuration = (1.5 + Math.random()*2) + 's';
    p.style.animationDelay = (Math.random()*0.6) + 's';
    p.style.fontSize = (20 + Math.random()*26) + 'px';
    document.body.appendChild(p);
    setTimeout(()=>p.remove(), 4000);
  }
}

/* ---- wire up ---- */
startBtn.addEventListener('click', startGame);
document.querySelectorAll('.lvl').forEach(btn => {
  btn.addEventListener('click', () => {
    if (busy) return;
    level = btn.dataset.level;
    document.querySelectorAll('.lvl').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

buildScene(); placeCupsToSlots();
</script>
</body>
</html>
